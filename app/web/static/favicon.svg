<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- llm-gateway favicon: a signal source fanning out to upstreams (routing /
       load balancing). Amber signal accent (#f0a830) on ink (#14171c), matching
       the patchbay console identity. -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#14171c" stroke="#2c333d" stroke-width="1"/>
  <g fill="none" stroke="#f0a830" stroke-width="1.8" stroke-linecap="round" opacity="0.85">
    <path d="M10 16 L22 9"/>
    <path d="M10 16 L23 16"/>
    <path d="M10 16 L22 23"/>
  </g>
  <!-- upstream nodes -->
  <g fill="#f0a830">
    <circle cx="22" cy="9" r="2.2"/>
    <circle cx="23" cy="16" r="2.2"/>
    <circle cx="22" cy="23" r="2.2"/>
  </g>
  <!-- source node, glowing -->
  <circle cx="10" cy="16" r="6" fill="#f0a830" opacity="0.18"/>
  <circle cx="10" cy="16" r="3.1" fill="#ffba47"/>
</svg>
