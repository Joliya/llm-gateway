# Example secret — DO NOT commit real values. Create the real one with:
#   kubectl create secret generic llm-gateway-secrets \
#     --from-literal=GW_MASTER_KEY=... \
#     --from-literal=GW_ENCRYPTION_KEY=... \
#     --from-literal=GW_DATABASE_URL='postgresql+asyncpg://user:pass@postgres:5432/llm_gateway' \
#     --from-literal=GW_REDIS_URL='redis://redis:6379/0'
apiVersion: v1
kind: Secret
metadata:
  name: llm-gateway-secrets
type: Opaque
stringData:
  GW_MASTER_KEY: "change-me-to-a-long-random-string"
  # Set explicitly so rotating the master key never orphans encrypted credentials.
  GW_ENCRYPTION_KEY: "set-a-stable-fernet-key"
  GW_DATABASE_URL: "postgresql+asyncpg://user:pass@postgres:5432/llm_gateway"
  GW_REDIS_URL: "redis://redis:6379/0"
