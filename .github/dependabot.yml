version: 2
updates:
  # Python dependencies (pyproject.toml + uv.lock)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns:
          - "*"

  # GitHub Actions used in CI
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Base image in the Dockerfile
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
